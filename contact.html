<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us | Al Dimashqi Restaurant</title>
  <meta name="description" content="Get in touch with Al Dimashqi Restaurant for reservations and inquiries." />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-light">

  <header>
    <div class="nav-container">
      <a href="index.html" class="logo">Al Dimashqi</a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="about.html">About</a>
        <a href="contact.html" class="active">Contact</a>
      </nav>
      <div class="controls">
        <button id="themeToggle" class="control-btn" aria-label="Toggle Dark Mode">🌓</button>
        <button id="langToggle" class="control-btn" aria-label="Toggle RTL">AR</button>
        <button id="menuBtn" class="menu-toggle">☰</button>
      </div>
    </div>
    <div id="mobileMenu" class="mobile-menu">
      <a href="index.html">Home</a>
      <a href="menu.html">Menu</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </div>
  </header>

  <div class="page-header" style="background-color: var(--black);">
    <h1 class="serif-text fade-in-up">Get in Touch</h1>
  </div>

  <main class="section-padding">
    <div class="contact-container fade-in-up">
      <h2 class="serif-text" style="font-size: 2rem; color: var(--primary-red); margin-bottom: 2.5rem; text-align: center;">Send Us a Message</h2>
      <form action="#" method="POST">
        <div class="form-group">
          <label for="name" style="display: block; margin-bottom: 0.6rem; font-weight: 500; color: var(--text-main);">Full Name</label>
          <input type="text" id="name" class="form-control" placeholder="John Doe" required />
        </div>
        <div class="form-group">
          <label for="email" style="display: block; margin-bottom: 0.6rem; font-weight: 500; color: var(--text-main);">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="john@example.com" required />
        </div>
        <div class="form-group">
          <label for="subject" style="display: block; margin-bottom: 0.6rem; font-weight: 500; color: var(--text-main);">Subject</label>
          <input type="text" id="subject" class="form-control" placeholder="Reservation Inquiry" required />
        </div>
        <div class="form-group">
          <label for="message" style="display: block; margin-bottom: 0.6rem; font-weight: 500; color: var(--text-main);">Message</label>
          <textarea id="message" class="form-control" placeholder="How can we help you?" required></textarea>
        </div>
        <button type="submit" class="btn-primary" style="width: 100%; font-size: 1.1rem; padding: 1.2rem;">Send Message</button>
      </form>
    </div>
  </main>

  <footer>
    <p>© 2026 Al Dimashqi Restaurant | Taste the tradition of Damascus. All Rights Reserved.</p>
  </footer>

  <script src="main.js"></script>
</body>
</html>
